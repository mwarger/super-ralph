configVersion = "2.1"
defaultAgent = "claude"
defaultTracker = "beads-rust"
agent = "claude"
tracker = "beads-rust"
prompt_template = "./.super-ralph/prompt.hbs"
skills_dir = "~/.agents/super-ralph/skills"
autoCommit = true
subagentTracingDetail = "full"

[agentOptions]
model = "opus"

[errorHandling]
strategy = "retry"
maxRetries = 3

[notifications]
enabled = true
sound = "system"
